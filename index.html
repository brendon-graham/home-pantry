<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="theme-color" content="#2d7d46">
<title>Home Pantry</title>
<style>
  :root {
    --green: #2d7d46;
    --green-light: #e8f5ec;
    --green-mid: #4caf74;
    --red: #c0392b;
    --red-light: #fdecea;
    --amber: #e67e22;
    --amber-light: #fef3e2;
    --grey: #6b7280;
    --grey-light: #f3f4f6;
    --border: #e5e7eb;
    --text: #111827;
    --text-muted: #6b7280;
    --shadow: 0 1px 3px rgba(0,0,0,.1);
    --radius: 10px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f9fafb; color: var(--text); min-height: 100dvh; }

  /* ── Header ── */
  .header { background: var(--green); color: white; padding: 14px 16px 0; position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 8px rgba(0,0,0,.2); }
  .header-top { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
  .header-top h1 { font-size: 1.2rem; font-weight: 700; }
  .header-actions { display: flex; gap: 8px; }
  .btn-icon { background: rgba(255,255,255,.2); border: none; color: white; border-radius: 8px; padding: 7px 10px; font-size: .85rem; cursor: pointer; display: flex; align-items: center; gap: 4px; font-weight: 600; }
  .btn-icon:hover { background: rgba(255,255,255,.3); }
  .btn-icon.scan-btn { background: rgba(255,255,255,.25); font-size: 1rem; padding: 6px 10px; }

  /* ── Tabs ── */
  .tabs { display: flex; }
  .tab { flex: 1; padding: 9px 0 11px; text-align: center; font-size: .88rem; font-weight: 600; color: rgba(255,255,255,.7); border-bottom: 3px solid transparent; cursor: pointer; transition: all .15s; }
  .tab.active { color: white; border-bottom-color: white; }

  /* ── Views ── */
  .view { display: none; padding: 16px; padding-bottom: 80px; }
  .view.active { display: block; }

  /* ── Filter bar ── */
  .filter-bar { display: flex; gap: 8px; margin-bottom: 14px; }
  .search-input { flex: 1; padding: 9px 12px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .9rem; background: white; }
  .search-input:focus { outline: none; border-color: var(--green); }
  .cat-filter { padding: 9px 10px; border: 1.5px solid var(--border); border-radius: 8px; font-size: .85rem; background: white; cursor: pointer; }

  /* ── Category section ── */
  .cat-section { margin-bottom: 20px; }
  .cat-header { font-size: .78rem; font-weight: 700; text-transform: uppercase; letter-spacing: .8px; color: var(--text-muted); margin-bottom: 8px; padding: 0 2px; }

  /* ── Pantry item card ── */
  .item-card { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; padding: 12px 14px; display: flex; align-items: center; gap: 12px; border-left: 4px solid transparent; }
  .item-card.low  { border-left-color: var(--red);      background: var(--red-light); }
  .item-card.warn { border-left-color: var(--amber);    background: var(--amber-light); }
  .item-card.ok   { border-left-color: var(--green-mid); }
  .item-info { flex: 1; min-width: 0; }
  .item-name { font-size: .95rem; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .item-meta { font-size: .78rem; color: var(--text-muted); margin-top: 2px; }
  .status-badge { font-size: .7rem; font-weight: 700; padding: 2px 6px; border-radius: 4px; margin-top: 3px; display: inline-block; }
  .badge-low  { background: var(--red);      color: white; }
  .badge-warn { background: var(--amber);    color: white; }
  .badge-ok   { background: var(--green-mid); color: white; }
  .item-qty { display: flex; align-items: center; }
  .qty-btn { width: 34px; height: 34px; border: 1.5px solid var(--border); background: var(--grey-light); border-radius: 8px; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .qty-btn:active { background: var(--border); }
  .qty-display { min-width: 52px; text-align: center; font-size: 1rem; font-weight: 700; padding: 0 6px; }
  .edit-btn { padding: 6px 8px; background: none; border: none; color: var(--grey); cursor: pointer; font-size: 1rem; border-radius: 6px; }
  .edit-btn:hover { background: var(--grey-light); }

  /* ── Shopping list ── */
  .shop-summary { background: var(--green); color: white; border-radius: var(--radius); padding: 14px 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; }
  .shop-summary-label { font-size: .85rem; opacity: .85; }
  .shop-summary-count { font-size: 1.6rem; font-weight: 800; }

  .shop-item { background: white; border-radius: var(--radius); box-shadow: var(--shadow); margin-bottom: 8px; padding: 13px 14px; display: flex; align-items: flex-start; gap: 12px; transition: opacity .3s; }
  .shop-item.done { opacity: .4; }

  .shop-checkbox { width: 26px; height: 26px; border-radius: 7px; border: 2.5px solid var(--green); background: white; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; margin-top: 2px; transition: all .15s; }
  .shop-checkbox.checked { background: var(--green); border-color: var(--green); }
  .shop-checkbox.checked::after { content: '✓'; color: white; font-size: .95rem; font-weight: 800; }

  .shop-item-body { flex: 1; min-width: 0; }
  .shop-item-name { font-size: .95rem; font-weight: 600; margin-bottom: 3px; }
  .shop-item-sub  { font-size: .78rem; color: var(--text-muted); margin-bottom: 8px; }

  .qty-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
  .qty-row-label { font-size: .78rem; color: var(--text-muted); font-weight: 600; }
  .shop-qty-stepper { display: flex; align-items: center; gap: 0; }
  .shop-qty-btn { width: 30px; height: 30px; border: 1.5px solid var(--border); background: var(--grey-light); border-radius: 6px; font-size: 1rem; cursor: pointer; display: flex; align-items: center; justify-content: center; font-weight: 700; }
  .shop-qty-btn:active { background: var(--border); }
  .shop-qty-val { min-width: 44px; text-align: center; font-size: .95rem; font-weight: 700; padding: 0 4px; }
  .qty-unit { font-size: .78rem; color: var(--text-muted); }
  .tick-hint { font-size: .72rem; color: var(--green); font-weight: 600; margin-top: 4px; }

  .shop-empty { text-align: center; padding: 48px 20px; color: var(--text-muted); }
  .shop-empty-icon { font-size: 3rem; margin-bottom: 12px; }
  .shop-empty-text { font-size: 1rem; font-weight: 600; }
  .shop-empty-sub  { font-size: .85rem; margin-top: 6px; }

  /* ── FAB ── */
  .fab { position: fixed; bottom: 24px; right: 20px; width: 56px; height: 56px; background: var(--green); color: white; border: none; border-radius: 50%; font-size: 1.6rem; cursor: pointer; box-shadow: 0 4px 14px rgba(0,0,0,.25); display: flex; align-items: center; justify-content: center; z-index: 50; }
  .fab:active { transform: scale(.95); }

  /* ── Modals ── */
  .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; align-items: flex-end; justify-content: center; }
  .modal-overlay.open { display: flex; }
  .modal { background: white; border-radius: 20px 20px 0 0; width: 100%; max-width: 520px; max-height: 90dvh; overflow-y: auto; padding: 20px 20px 40px; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 20px; }
  .modal h2 { font-size: 1.1rem; font-weight: 700; margin-bottom: 18px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: .8rem; font-weight: 600; color: var(--text-muted); text-transform: uppercase; letter-spacing: .5px; display: block; margin-bottom: 5px; }
  .form-input, .form-select { width: 100%; padding: 11px 12px; border: 1.5px solid var(--border); border-radius: 9px; font-size: .95rem; background: white; color: var(--text); }
  .form-input:focus, .form-select:focus { outline: none; border-color: var(--green); }
  .form-row   { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
  .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
  .btn-primary   { flex: 1; padding: 13px; background: var(--green); color: white; border: none; border-radius: 10px; font-size: 1rem; font-weight: 700; cursor: pointer; }
  .btn-secondary { padding: 13px 20px; background: var(--grey-light); color: var(--text); border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }
  .btn-danger    { padding: 13px 20px; background: var(--red-light); color: var(--red); border: none; border-radius: 10px; font-size: 1rem; font-weight: 600; cursor: pointer; }

  /* ── Scan modal ── */
  .scan-loading { text-align: center; padding: 32px 0; }
  .scan-spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--green); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 12px; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .scan-item-row { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .scan-item-row:last-child { border-bottom: none; }
  .scan-item-info { flex: 1; }
  .scan-item-name { font-size: .92rem; font-weight: 600; }
  .scan-item-sub  { font-size: .75rem; color: var(--text-muted); margin-top: 2px; }
  .scan-add-btn { padding: 7px 14px; background: var(--green); color: white; border: none; border-radius: 8px; font-size: .82rem; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .scan-add-btn.added { background: var(--grey-light); color: var(--text-muted); }
  .scan-error { color: var(--red); font-size: .85rem; padding: 12px 0; }
  .scan-preview { width: 100%; max-height: 160px; object-fit: cover; border-radius: 10px; margin-bottom: 16px; }

  /* ── Sync dot ── */
  .sync-label { font-size: .74rem; opacity: .85; display: flex; align-items: center; gap: 5px; margin-top: 2px; }
  .sync-dot { width: 7px; height: 7px; border-radius: 50%; background: #86efac; flex-shrink: 0; }
  .sync-dot.syncing { background: #fcd34d; }
  .sync-dot.offline { background: #fca5a5; }

  /* ── Settings ── */
  .settings-url-display { font-size: .72rem; font-family: monospace; color: var(--text-muted); word-break: break-all; background: var(--grey-light); padding: 8px 10px; border-radius: 7px; margin-bottom: 14px; }

  /* ── Toast ── */
  .toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: #1f2937; color: white; padding: 10px 18px; border-radius: 24px; font-size: .88rem; font-weight: 600; z-index: 300; opacity: 0; transition: opacity .3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
</style>
</head>
<body>

<!-- hidden camera input -->
<input type="file" id="camera-input" accept="image/*" capture="environment" style="display:none">

<div class="header">
  <div class="header-top">
    <div>
      <h1>🛒 Home Pantry</h1>
      <div class="sync-label">
        <span class="sync-dot" id="sync-dot"></span>
        <span id="sync-label">Loading…</span>
      </div>
    </div>
    <div class="header-actions">
      <button class="btn-icon scan-btn" onclick="openCamera()" title="Scan fridge or shelf">📷 Scan</button>
      <button class="btn-icon" onclick="fetchItems()">↻</button>
      <button class="btn-icon" onclick="showSettings()">⚙️</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tab-pantry" onclick="switchTab('pantry')">Pantry</div>
    <div class="tab" id="tab-shop" onclick="switchTab('shop')">Shopping<span id="shop-badge"></span></div>
  </div>
</div>

<!-- PANTRY VIEW -->
<div class="view active" id="view-pantry">
  <div class="filter-bar">
    <input class="search-input" id="search-input" type="search" placeholder="Search items…" oninput="renderPantry()">
    <select class="cat-filter" id="cat-filter" onchange="renderPantry()">
      <option value="">All</option>
    </select>
  </div>
  <div id="pantry-list"></div>
</div>

<!-- SHOPPING VIEW -->
<div class="view" id="view-shop">
  <div class="shop-summary">
    <div>
      <div class="shop-summary-label">Items needed</div>
      <div class="shop-summary-count" id="shop-count">0</div>
    </div>
    <div style="text-align:right">
      <div class="shop-summary-label">Purchased</div>
      <div class="shop-summary-count" id="shop-done-count">0</div>
    </div>
  </div>
  <div id="shop-list"></div>
</div>

<button class="fab" id="fab" onclick="openAddModal()">+</button>

<!-- ══ ITEM MODAL ══ -->
<div class="modal-overlay" id="item-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modal-title">Add Item</h2>
    <input type="hidden" id="modal-id">
    <div class="form-group">
      <label class="form-label">Item Name</label>
      <input class="form-input" id="f-name" type="text" placeholder="e.g. Milk">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label class="form-label">Category</label>
        <select class="form-select" id="f-cat">
          <option>Dairy</option>
          <option>Meat &amp; Fish</option>
          <option>Produce</option>
          <option>Pantry</option>
          <option>Frozen</option>
          <option>Bakery</option>
          <option>Drinks</option>
          <option>Cleaning</option>
          <option>Personal Care</option>
          <option>Other</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Unit</label>
        <input class="form-input" id="f-unit" type="text" placeholder="L, kg, pack…">
      </div>
    </div>
    <div class="form-row-3">
      <div class="form-group">
        <label class="form-label">On Hand</label>
        <input class="form-input" id="f-onhand" type="number" min="0" step="0.5" placeholder="0">
      </div>
      <div class="form-group">
        <label class="form-label">Min Stock</label>
        <input class="form-input" id="f-threshold" type="number" min="0" step="0.5" placeholder="2">
      </div>
      <div class="form-group">
        <label class="form-label">Restock To</label>
        <input class="form-input" id="f-restock" type="number" min="0" step="0.5" placeholder="4">
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeModal()">Cancel</button>
      <button class="btn-danger" id="delete-btn" onclick="deleteItem()" style="display:none">Delete</button>
      <button class="btn-primary" onclick="saveItem()">Save</button>
    </div>
  </div>
</div>

<!-- ══ SCAN MODAL ══ -->
<div class="modal-overlay" id="scan-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>📷 Scan Results</h2>
    <div id="scan-body"></div>
    <div class="modal-actions" style="margin-top:16px">
      <button class="btn-secondary" onclick="closeScanModal()">Done</button>
    </div>
  </div>
</div>

<!-- ══ SETTINGS MODAL ══ -->
<div class="modal-overlay" id="settings-modal">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2>Settings</h2>
    <div class="form-group">
      <label class="form-label">Apps Script URL</label>
      <input class="form-input" id="settings-url" type="url" style="font-size:.75rem;font-family:monospace">
    </div>
    <div class="form-group">
      <label class="form-label">Camera Scan (Claude API Key)</label>
      <p style="font-size:.78rem;color:var(--text-muted);margin-bottom:6px">Set <code style="background:var(--grey-light);padding:1px 5px;border-radius:4px">CLAUDE_API_KEY</code> in your Apps Script Project Settings → Script Properties. The key never leaves the server.</p>
    </div>
    <div class="modal-actions">
      <button class="btn-secondary" onclick="closeSettings()">Cancel</button>
      <button class="btn-primary" onclick="saveSettings()">Save URL</button>
    </div>
    <div style="margin-top:12px">
      <button class="btn-danger" style="width:100%" onclick="confirmClear()">Reset &amp; reconnect</button>
    </div>
    <div style="text-align:center;font-size:.75rem;color:var(--text-muted);margin-top:20px">Home Pantry v2.1</div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── Config ─────────────────────────────────────────────────────────────────
const DEFAULT_URL = 'https://script.google.com/macros/s/AKfycbw3NfPBm_Hy9_VNyMb3hnce52rtSzQ5r9N2LO-38_XwUS4l2DKjFu57XiHYH9fQH2gL/exec';
let SCRIPT_URL = localStorage.getItem('pantry_script_url') || DEFAULT_URL;

const CATEGORIES = ['Dairy','Meat & Fish','Produce','Pantry','Frozen','Bakery','Drinks','Cleaning','Personal Care','Other'];

// ── State ──────────────────────────────────────────────────────────────────
let items = {};
let shopBuyQty  = {};   // { id: number } — adjustable buy qty per session
let shopTicked  = {};   // { id: bool }   — purchased this session

// ── Boot ───────────────────────────────────────────────────────────────────
window.addEventListener('DOMContentLoaded', () => {
  populateCatFilter();
  fetchItems();
  setInterval(fetchItems, 10000);
});

// ── Data ───────────────────────────────────────────────────────────────────
async function fetchItems() {
  setSyncStatus('syncing');
  try {
    const res  = await fetch(SCRIPT_URL);
    const data = await res.json();
    const fresh = {};
    (data.items || []).forEach(it => { fresh[it.id] = it; });
    // Reset buy qty for items newly above threshold (restocked)
    Object.keys(shopTicked).forEach(id => {
      if (fresh[id] && fresh[id].onHand >= fresh[id].threshold) {
        delete shopTicked[id];
        delete shopBuyQty[id];
      }
    });
    items = fresh;
    renderPantry();
    renderShop();
    setSyncStatus('ok');
  } catch {
    setSyncStatus('offline');
  }
}

async function apiPost(body) {
  try {
    const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(body) });
    return await res.json();
  } catch(e) {
    return { error: e.message };
  }
}

function setSyncStatus(state) {
  document.getElementById('sync-dot').className = 'sync-dot' +
    (state === 'offline' ? ' offline' : state === 'syncing' ? ' syncing' : '');
  document.getElementById('sync-label').textContent =
    state === 'ok' ? 'Synced' : state === 'syncing' ? 'Syncing…' : 'Offline';
}

// ── Tabs ───────────────────────────────────────────────────────────────────
window.switchTab = function(tab) {
  ['pantry','shop'].forEach(t => {
    document.getElementById('tab-' + t).classList.toggle('active', t === tab);
    document.getElementById('view-' + t).classList.toggle('active', t === tab);
  });
  document.getElementById('fab').style.display = tab === 'pantry' ? 'flex' : 'none';
};

function populateCatFilter() {
  const sel = document.getElementById('cat-filter');
  CATEGORIES.forEach(c => {
    const o = document.createElement('option');
    o.value = c; o.textContent = c; sel.appendChild(o);
  });
}

// ── Pantry render ──────────────────────────────────────────────────────────
window.renderPantry = function() {
  const search = document.getElementById('search-input').value.toLowerCase();
  const catF   = document.getElementById('cat-filter').value;
  const list   = document.getElementById('pantry-list');

  const filtered = Object.entries(items).filter(([,v]) =>
    (!catF || v.cat === catF) && (!search || v.name.toLowerCase().includes(search))
  );

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:48px 20px;color:var(--text-muted)">
      <div style="font-size:2.5rem;margin-bottom:12px">🥫</div>
      <div style="font-weight:600">No items yet</div>
      <div style="font-size:.85rem;margin-top:6px">Tap + to add, or use 📷 Scan to detect items</div>
    </div>`;
    return;
  }

  const byCat = {};
  filtered.forEach(([id,v]) => { (byCat[v.cat] = byCat[v.cat] || []).push([id,v]); });

  list.innerHTML = CATEGORIES.filter(c => byCat[c]).map(cat => `
    <div class="cat-section">
      <div class="cat-header">${cat}</div>
      ${byCat[cat].map(([id,v]) => pantryCard(id,v)).join('')}
    </div>`).join('');
};

function pantryCard(id, v) {
  const pct   = v.threshold > 0 ? v.onHand / v.threshold : 1;
  const cls   = pct <= 0 ? 'low' : pct < 1 ? 'warn' : 'ok';
  const badge = pct <= 0
    ? `<span class="status-badge badge-low">OUT</span>`
    : pct < 1
    ? `<span class="status-badge badge-warn">LOW</span>`
    : `<span class="status-badge badge-ok">OK</span>`;
  return `<div class="item-card ${cls}">
    <div class="item-info">
      <div class="item-name">${esc(v.name)}</div>
      <div class="item-meta">Min: ${v.threshold} ${esc(v.unit)} · Restock to: ${v.restock} ${esc(v.unit)}</div>
      ${badge}
    </div>
    <div class="item-qty">
      <button class="qty-btn" onclick="adjustOnHand('${id}',-0.5)">−</button>
      <div class="qty-display">${v.onHand}<br><span style="font-size:.65rem;color:var(--text-muted);font-weight:400">${esc(v.unit)}</span></div>
      <button class="qty-btn" onclick="adjustOnHand('${id}',0.5)">+</button>
    </div>
    <button class="edit-btn" onclick="openEditModal('${id}')">✏️</button>
  </div>`;
}

// ── Adjust on-hand from pantry ─────────────────────────────────────────────
window.adjustOnHand = async function(id, delta) {
  const v = items[id]; if (!v) return;
  const newVal = Math.max(0, +(v.onHand + delta).toFixed(2));
  items[id] = { ...v, onHand: newVal };
  renderPantry(); renderShop();
  await apiPost({ action: 'save', item: { id, ...items[id] } });
};

// ── Shopping list render ───────────────────────────────────────────────────
window.renderShop = function() {
  const shopItems = Object.entries(items).filter(([,v]) => v.onHand < v.threshold);
  const list      = document.getElementById('shop-list');
  const doneCount = shopItems.filter(([id]) => shopTicked[id]).length;

  document.getElementById('shop-badge').textContent =
    shopItems.length > 0 ? ` (${shopItems.length - doneCount})` : '';
  document.getElementById('shop-count').textContent     = shopItems.length;
  document.getElementById('shop-done-count').textContent = doneCount;

  if (!shopItems.length) {
    list.innerHTML = `<div class="shop-empty">
      <div class="shop-empty-icon">✅</div>
      <div class="shop-empty-text">All stocked up!</div>
      <div class="shop-empty-sub">Items appear here when stock falls below minimum</div>
    </div>`;
    return;
  }

  // Unticked first
  shopItems.sort(([a],[b]) => (shopTicked[a] ? 1 : 0) - (shopTicked[b] ? 1 : 0));

  list.innerHTML = shopItems.map(([id,v]) => {
    const needed = Math.max(0, +(v.restock - v.onHand).toFixed(2));
    if (shopBuyQty[id] === undefined) shopBuyQty[id] = needed;
    const qty    = shopBuyQty[id];
    const ticked = !!shopTicked[id];
    return `<div class="shop-item ${ticked ? 'done' : ''}" id="sitem-${id}">
      <div class="shop-checkbox ${ticked ? 'checked' : ''}" onclick="purchaseItem('${id}')"></div>
      <div class="shop-item-body">
        <div class="shop-item-name">${esc(v.name)}</div>
        <div class="shop-item-sub">${v.cat} · Have ${v.onHand} ${esc(v.unit)} · Need ${needed} ${esc(v.unit)}</div>
        <div class="qty-row">
          <span class="qty-row-label">Buying:</span>
          <div class="shop-qty-stepper">
            <button class="shop-qty-btn" onclick="changeShopQty('${id}',-0.5)">−</button>
            <div class="shop-qty-val" id="sqty-${id}">${qty}</div>
            <button class="shop-qty-btn" onclick="changeShopQty('${id}',0.5)">+</button>
          </div>
          <span class="qty-unit">${esc(v.unit)}</span>
        </div>
        ${!ticked ? `<div class="tick-hint">↑ Adjust then tick to add to pantry</div>` : `<div class="tick-hint" style="color:var(--text-muted)">Added to pantry ✓</div>`}
      </div>
    </div>`;
  }).join('');
};

window.changeShopQty = function(id, delta) {
  shopBuyQty[id] = Math.max(0, +((shopBuyQty[id] || 0) + delta).toFixed(2));
  const el = document.getElementById('sqty-' + id);
  if (el) el.textContent = shopBuyQty[id];
};

window.purchaseItem = async function(id) {
  if (shopTicked[id]) return;   // already purchased
  const v = items[id]; if (!v) return;
  const qty    = shopBuyQty[id] !== undefined ? shopBuyQty[id] : Math.max(0, +(v.restock - v.onHand).toFixed(2));
  const newVal = +(v.onHand + qty).toFixed(2);

  // Optimistic update
  shopTicked[id] = true;
  items[id] = { ...v, onHand: newVal };
  renderPantry();
  renderShop();
  toast(`✓ ${qty} ${v.unit} of ${v.name} added to pantry`);

  await apiPost({ action: 'save', item: { id, ...items[id] } });
};

// ── Item modal ─────────────────────────────────────────────────────────────
window.openAddModal = function(prefill = {}) {
  document.getElementById('modal-title').textContent = 'Add Item';
  document.getElementById('modal-id').value = '';
  document.getElementById('f-name').value      = prefill.name || '';
  document.getElementById('f-cat').value       = prefill.cat  || 'Pantry';
  document.getElementById('f-unit').value      = prefill.unit || '';
  document.getElementById('f-onhand').value    = '';
  document.getElementById('f-threshold').value = '';
  document.getElementById('f-restock').value   = '';
  document.getElementById('delete-btn').style.display = 'none';
  document.getElementById('item-modal').classList.add('open');
  setTimeout(() => document.getElementById('f-name').focus(), 100);
};

window.openEditModal = function(id) {
  const v = items[id]; if (!v) return;
  document.getElementById('modal-title').textContent = 'Edit Item';
  document.getElementById('modal-id').value     = id;
  document.getElementById('f-name').value       = v.name;
  document.getElementById('f-cat').value        = v.cat;
  document.getElementById('f-unit').value       = v.unit;
  document.getElementById('f-onhand').value     = v.onHand;
  document.getElementById('f-threshold').value  = v.threshold;
  document.getElementById('f-restock').value    = v.restock;
  document.getElementById('delete-btn').style.display = 'block';
  document.getElementById('item-modal').classList.add('open');
};

window.closeModal = function() {
  document.getElementById('item-modal').classList.remove('open');
};

window.saveItem = async function() {
  const name = document.getElementById('f-name').value.trim();
  if (!name) { alert('Item name required'); return; }
  const id   = document.getElementById('modal-id').value || crypto.randomUUID();
  const item = {
    id,
    name,
    cat:       document.getElementById('f-cat').value,
    unit:      document.getElementById('f-unit').value.trim() || 'each',
    onHand:    parseFloat(document.getElementById('f-onhand').value)    || 0,
    threshold: parseFloat(document.getElementById('f-threshold').value) || 0,
    restock:   parseFloat(document.getElementById('f-restock').value)   || 0,
  };
  items[id] = item;
  renderPantry(); renderShop();
  closeModal();
  await apiPost({ action: 'save', item });
  toast('Saved ' + name);
};

window.deleteItem = async function() {
  const id = document.getElementById('modal-id').value; if (!id) return;
  if (!confirm(`Delete "${items[id]?.name}"?`)) return;
  delete items[id];
  renderPantry(); renderShop();
  closeModal();
  await apiPost({ action: 'delete', id });
  toast('Deleted');
};

// ── Camera scan ────────────────────────────────────────────────────────────
window.openCamera = function() {
  document.getElementById('camera-input').click();
};

document.getElementById('camera-input').addEventListener('change', async (e) => {
  const file = e.target.files[0]; if (!file) return;
  e.target.value = '';  // reset so same photo can be retaken

  // Show modal with loading spinner
  const body = document.getElementById('scan-body');
  body.innerHTML = `<div class="scan-loading"><div class="scan-spinner"></div><div style="color:var(--text-muted);font-size:.88rem">Identifying items…</div></div>`;
  document.getElementById('scan-modal').classList.add('open');

  try {
    // Compress image
    const { data, mediaType } = await compressImage(file);

    // Show preview
    const previewUrl = 'data:' + mediaType + ';base64,' + data;

    const result = await apiPost({ action: 'scanImage', image: data, mediaType });

    if (result.error) {
      body.innerHTML = `<div class="scan-error">⚠️ ${esc(result.error)}</div>`;
      return;
    }

    const found = result.items || [];
    if (!found.length) {
      body.innerHTML = `<img class="scan-preview" src="${previewUrl}"><div class="scan-error">No grocery items detected — try a clearer photo.</div>`;
      return;
    }

    body.innerHTML = `
      <img class="scan-preview" src="${previewUrl}">
      <p style="font-size:.82rem;color:var(--text-muted);margin-bottom:12px">${found.length} item${found.length !== 1 ? 's' : ''} identified — tap Add to set quantities and save.</p>
      ${found.map((it, i) => `
        <div class="scan-item-row" id="scan-row-${i}">
          <div class="scan-item-info">
            <div class="scan-item-name">${esc(it.name)}</div>
            <div class="scan-item-sub">${esc(it.cat)} · ${esc(it.unit)}</div>
          </div>
          <button class="scan-add-btn" id="scan-btn-${i}" onclick="addScannedItem(${i},'${esc(it.name)}','${esc(it.cat)}','${esc(it.unit)}')">+ Add</button>
        </div>`).join('')}`;
  } catch(err) {
    body.innerHTML = `<div class="scan-error">⚠️ ${esc(err.message)}</div>`;
  }
});

window.addScannedItem = function(i, name, cat, unit) {
  const btn = document.getElementById('scan-btn-' + i);
  if (btn) { btn.textContent = 'Added ✓'; btn.classList.add('added'); btn.disabled = true; }
  document.getElementById('scan-modal').classList.remove('open');
  openAddModal({ name, cat, unit });
};

window.closeScanModal = function() {
  document.getElementById('scan-modal').classList.remove('open');
};

async function compressImage(file, maxPx = 900) {
  return new Promise(resolve => {
    const img = new Image();
    const url = URL.createObjectURL(file);
    img.onload = () => {
      const scale  = Math.min(1, maxPx / Math.max(img.width, img.height));
      const canvas = document.createElement('canvas');
      canvas.width  = Math.round(img.width  * scale);
      canvas.height = Math.round(img.height * scale);
      canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
      URL.revokeObjectURL(url);
      resolve({
        data:      canvas.toDataURL('image/jpeg', 0.82).split(',')[1],
        mediaType: 'image/jpeg'
      });
    };
    img.src = url;
  });
}

// ── Settings ───────────────────────────────────────────────────────────────
window.showSettings = function() {
  document.getElementById('settings-url').value = SCRIPT_URL;
  document.getElementById('settings-modal').classList.add('open');
};
window.closeSettings = function() {
  document.getElementById('settings-modal').classList.remove('open');
};
window.saveSettings = function() {
  const url = document.getElementById('settings-url').value.trim();
  if (url) { localStorage.setItem('pantry_script_url', url); SCRIPT_URL = url; }
  closeSettings();
  fetchItems();
  toast('URL updated');
};
window.confirmClear = function() {
  if (!confirm('Clear saved URL and reload?')) return;
  localStorage.removeItem('pantry_script_url');
  location.reload();
};

// ── Helpers ────────────────────────────────────────────────────────────────
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

window.toast = function(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
};

document.querySelectorAll('.modal-overlay').forEach(o =>
  o.addEventListener('click', e => { if (e.target === o) o.classList.remove('open'); })
);
</script>
